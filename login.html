<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
}

#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #f3e8ff, #e0f2fe);
    z-index: -1;
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.3);
}
</style>

</head>

<body>

<div id="particles-js"></div>

<div class="flex items-center justify-center min-h-screen">

<div class="glass rounded-3xl shadow-2xl w-[1050px] h-[480px] flex overflow-hidden">

<!-- LEFT SIDE -->
<div class="w-1/2 p-10 flex flex-col justify-center">

    <h1 class="text-3xl font-bold mb-2">Welcome back 👋</h1>
    <p class="text-gray-700 mb-5">Login to your account</p>

    <!-- ✅ FIXED FORM -->
    <form id="loginForm">

        <select name="role" id="role"
            class="w-full p-3 rounded-lg mb-4 border focus:ring-2 focus:ring-purple-300">
            <option value="">Select Role</option>
            <option value="teacher">Teacher</option>
            <option value="student">Student</option>
        </select>

        <input name="password" id="password" type="password"
            placeholder="Teacher Password"
            class="w-full p-3 rounded-lg mb-4 border hidden">

        <input name="usn" id="usn" type="text"
            placeholder="USN (1DB23IS001)"
            class="w-full p-3 rounded-lg mb-4 border hidden">

        <!-- ✅ FIXED BUTTON -->
        <button type="button"
            onclick="handleLogin()"
            class="w-full bg-gradient-to-r from-purple-400 to-pink-400 text-white py-3 rounded-lg hover:scale-105 transition">
            Login
        </button>

    </form>

</div>

<!-- RIGHT SIDE -->
<div class="w-1/2 h-full">
    <img id="image"
        src="https://img.freepik.com/free-vector/login-concept-illustration_114360-757.jpg"
        class="w-full h-full object-cover scale-110 translate-x-6">
</div>

</div>

</div>

<script>
const role = document.getElementById("role");
const password = document.getElementById("password");
const usn = document.getElementById("usn");
const image = document.getElementById("image");

role.addEventListener("change", () => {

    password.classList.add("hidden");
    usn.classList.add("hidden");

    if (role.value === "teacher") {
        password.classList.remove("hidden");
        image.src = "https://img.freepik.com/free-vector/teacher-concept-illustration_114360-1638.jpg";
    }

    else if (role.value === "student") {
        usn.classList.remove("hidden");
        image.src = "https://img.freepik.com/free-vector/studying-concept-illustration_114360-2299.jpg";
    }

    else {
        image.src = "https://img.freepik.com/free-vector/login-concept-illustration_114360-757.jpg";
    }
});

<!-- ✅ LOGIN FIX -->
function handleLogin() {
    const selectedRole = role.value;
    const pass = password.value;
    const studentUSN = usn.value;

    if (!selectedRole) {
        alert("Please select role");
        return;
    }

    if (selectedRole === "teacher") {
        if (pass !== "admin") {
            alert("Wrong password (use: admin)");
            return;
        }
        window.location.href = "/teacher";
    }

    else if (selectedRole === "student") {
        if (!studentUSN) {
            alert("Enter USN");
            return;
        }
        window.location.href = "/student/" + studentUSN;
    }
}

// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 4},
    move: { speed: 3},
    line_linked: { enable: true }
  }
});
</script>
</body>
</html>
